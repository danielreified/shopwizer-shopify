# Checkout Upsells Extension
# Shows product recommendations during checkout to increase AOV
# https://shopify.dev/docs/api/checkout-ui-extensions/latest/configuration

api_version = "2025-07"

[[extensions]]
name = "Checkout Upsells"
handle = "checkout-upsells"
uid = "c09d6804-691a-9e7f-bd87-d3027ad133fe3c99c163"
type = "ui_extension"

# Checkout block - appears during checkout flow
[[extensions.targeting]]
module = "./src/CheckoutBlock.jsx"
target = "purchase.checkout.block.render"

[extensions.capabilities]
# Access to Storefront API for product data
api_access = true

# REQUIRED: Access to make external network calls to our recs API
network_access = true

# Settings for merchant customization
[extensions.settings]
[[extensions.settings.fields]]
key = "heading_title"
type = "single_line_text_field"
name = "Heading"
description = "Title displayed above recommendations"

[[extensions.settings.fields]]
key = "products_to_show"
type = "number_integer"
name = "Products to show"
description = "Number of products to display (2-4)"

[[extensions.settings.fields]]
key = "show_add_to_cart"
type = "boolean"
name = "Show Add to Cart"
description = "Allow customers to add products directly from checkout"
